version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: code_rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: code_rag_pro_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: code_rag_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=code_rag_pro_db
      - OLLAMA_MODEL=qwen2.5:7b
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./data:/app/data
    stdin_open: true
    tty: true

volumes:
  postgres_data:
